<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CSD Explorer</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%23050505'/%3E%3Crect x='3' y='3' width='4.4' height='4.4' rx='1' fill='%2357d977'/%3E%3Crect x='8.6' y='3' width='4.4' height='4.4' rx='1' fill='%23173b22'/%3E%3Crect x='3' y='8.6' width='4.4' height='4.4' rx='1' fill='%23173b22'/%3E%3Crect x='8.6' y='8.6' width='4.4' height='4.4' rx='1' fill='%23ffd24a'/%3E%3C/svg%3E" />
<style>
  :root{--bg:#050505;--panel:#0a0c0b;--panel2:#0d0f0e;--line:#1b1f1d;--green:#57d977;--amber:#ffd24a;--fg:#f2f2f2;--dim:#6f6f6f;--dim2:#a6a6a6;--red:#ff6b6b}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.55 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(60% 40% at 70% -10%,rgba(87,217,119,.05),transparent 60%),
               radial-gradient(40% 30% at 10% 110%,rgba(255,210,74,.04),transparent 60%)}
  a{color:var(--green);text-decoration:none}a:hover{text-decoration:underline}
  header{position:sticky;top:0;background:linear-gradient(#050505f5,#050505e6);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);padding:13px 18px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;z-index:5}
  header::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,rgba(87,217,119,.5),rgba(255,210,74,.4),transparent)}
  /* the unified nav (#site-header) is filled by cairn's /header.js when proxied; on a direct :8793 hit
     that file 404s, so hide the empty bar instead of showing a styled-but-blank strip. */
  #site-header:empty{display:none}#site-header::after{content:none}
  .brand{font-weight:700;letter-spacing:.5px;color:var(--green);display:flex;gap:8px;align-items:center}
  .brand:hover{text-decoration:none;filter:brightness(1.2)}
  .brand b{color:var(--amber)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
  @keyframes pulse{50%{opacity:.4}}
  form.search{flex:1;min-width:220px;display:flex}
  form.search input{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--fg);padding:8px 10px;border-radius:6px 0 0 6px;font-family:inherit}
  form.search button{background:var(--panel2);border:1px solid var(--line);border-left:0;color:var(--green);padding:0 14px;border-radius:0 6px 6px 0;cursor:pointer;font-family:inherit}
  .stats{display:flex;gap:14px;color:var(--dim2);font-size:12px;flex-wrap:wrap}
  .stats b{color:var(--fg)}
  main{max-width:1140px;margin:0 auto;padding:22px 20px}
  .panel{background:linear-gradient(180deg,var(--panel),#080a09);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:18px;position:relative;transition:border-color .15s}
  .panel:hover{border-color:#242a27}
  h2{margin:.2em 0 .6em;font-size:12px;color:var(--amber);font-weight:600;text-transform:uppercase;letter-spacing:1.5px}
  /* chain-pulse hero */
  .pulse{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
  .pu{background:linear-gradient(180deg,var(--panel),#080a09);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .pu .n{font-size:22px;color:var(--fg);letter-spacing:-.5px}
  .pu .n .u{font-size:12px;color:var(--dim2)}
  .pu .l{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;margin-top:3px}
  .pu.hot .n{color:var(--green)}
  .pu.gold .n{color:var(--amber)}
  /* coin cards */
  .coins{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
  .coin{border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:#080a09;transition:transform .15s,border-color .15s;display:block;color:inherit}
  .coin:hover{transform:translateY(-2px);border-color:rgba(255,210,74,.4);text-decoration:none}
  .coin .tk{font-size:17px;color:var(--amber);font-weight:700}
  .coin .nm{color:var(--dim2);font-size:12px;margin-left:6px}
  .coin .meta{display:flex;gap:14px;margin-top:8px;font-size:12px;color:var(--dim2);flex-wrap:wrap}
  .coin .meta b{color:var(--fg)}
  .bar{height:4px;background:#101513;border-radius:3px;margin-top:10px;overflow:hidden}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,#2a6,var(--green));transition:width .6s ease-out}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--line);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}
  th{color:var(--dim);font-weight:500}
  tr:hover td{background:#0d0d0d}
  .mono{font-family:inherit}.dim{color:var(--dim)}.amber{color:var(--amber)}.green{color:var(--green)}.red{color:var(--red)}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;border:1px solid}
  .badge.ok{color:var(--green);border-color:#1f4d2e;background:#0b1a10}
  .badge.bad{color:var(--red);border-color:#4d1f1f;background:#1a0b0b}
  .badge.pend{color:var(--amber);border-color:#4d421f;background:#1a160b}
  .kv{display:grid;grid-template-columns:160px 1fr;gap:6px 14px;font-size:13px}
  .kv div:nth-child(odd){color:var(--dim)}
  .kv .v{word-break:break-all;white-space:normal}
  .pill{font-size:11px;padding:1px 7px;border:1px solid var(--line);border-radius:5px;color:var(--dim2)}
  .feed-row{animation:flash 1.2s ease-out}
  @keyframes flash{from{background:#13241a}to{background:transparent}}
  code{background:#0d0d0d;border:1px solid var(--line);padding:1px 5px;border-radius:4px;color:var(--dim2);word-break:break-all}
  .muted{color:var(--dim);font-size:12px;margin-top:10px}
  .row{display:flex;gap:16px;flex-wrap:wrap}.row>.panel{flex:1;min-width:280px}
  .loading{color:var(--dim);padding:20px;text-align:center}
  .skel{background:linear-gradient(90deg,#0d0f0e,#16241c,#0d0f0e);background-size:200% 100%;border-radius:6px;height:14px;margin:10px 0;animation:shimmer 1.4s ease-in-out infinite}
  @keyframes shimmer{to{background-position:-200% 0}}
  @media (prefers-reduced-motion: reduce){ .dot,.feed-row,.skel{animation:none!important} }
  @media (prefers-reduced-motion: no-preference){
    .panel,.pu,.coin{animation:rise .35s ease-out backwards}
    .panel:nth-child(2){animation-delay:.05s}.panel:nth-child(3){animation-delay:.1s}
    .panel:nth-child(4){animation-delay:.15s}.panel:nth-child(5){animation-delay:.2s}
    .pu:nth-child(2){animation-delay:.04s}.pu:nth-child(3){animation-delay:.08s}
    .pu:nth-child(4){animation-delay:.12s}.pu:nth-child(5){animation-delay:.16s}.pu:nth-child(6){animation-delay:.2s}
    .coin:nth-child(2){animation-delay:.06s}.coin:nth-child(3){animation-delay:.12s}
    @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  }
  footer{color:var(--dim);font-size:11px;text-align:center;padding:24px;border-top:1px solid var(--line);margin-top:20px}
  /* ── human-readable layer ── */
  .chip{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;border:1px solid #3a3414;background:#171304;color:var(--amber);margin-left:6px;vertical-align:1px}
  .action{font-size:15px;line-height:1.6;padding:4px 0 10px}
  .action .what{color:var(--fg)}
  /* a CairnX record the resolver REFUSED: strike the claim + tag it "no effect" so it never reads as a successful mint/transfer */
  .cx-void{opacity:.55;text-decoration:line-through;text-decoration-color:rgba(255,107,107,.5)}
  .cx-void .what,.cx-void b{color:var(--dim2)!important}
  .cx-noeffect{display:inline-block;margin-left:6px;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--red);border:1px solid #4d1f1f;background:#1a0b0b;border-radius:3px;padding:1px 6px;vertical-align:1px;text-decoration:none;cursor:help;white-space:nowrap}
  .flow{display:flex;flex-wrap:wrap;gap:8px 22px;font-size:13px;padding:8px 0 2px}
  .flow .f{color:var(--dim2)} .flow b{color:var(--fg)}
  .flow .out b{color:var(--red)} .flow .in b{color:var(--green)}
  .scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .cxbal{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
  .cxbal .tk{border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:13px}
  .cxbal .tk b{color:var(--amber)}
  .cxbal .nm{border:1px solid #1f4d2e;border-radius:8px;padding:6px 12px;font-size:13px;color:var(--green)}
  .addrl.hasname{color:var(--green)}
  .namehdr{display:flex;gap:14px;align-items:center}
  .navatar{display:inline-grid;place-items:center;width:46px;height:46px;border-radius:12px;border:1px solid var(--line);font-size:20px;font-weight:700;color:#eafff0;flex:none}
  .tabs{display:flex;gap:6px;margin:2px 0 10px}
  .tab{background:var(--panel2);border:1px solid var(--line);color:var(--dim2);padding:4px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px}
  .tab.on{color:var(--green);border-color:#1f4d2e;background:#0b1a10}
  .actrow{display:flex;justify-content:space-between;align-items:center;gap:12px;border-bottom:1px solid var(--line);padding:2px 0}
  .actrow:last-child{border-bottom:none}
  .spark{padding:6px 0}
  .chart-wrap{position:relative}
  .ch-tip{position:absolute;pointer-events:none;background:#000;border:1px solid var(--green);padding:4px 9px;font-size:11px;color:var(--fg);white-space:nowrap;opacity:0;transform:translate(-50%,-135%);transition:opacity .1s;z-index:6}
  .tok-search{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--fg);padding:8px 10px;border-radius:6px;font-family:inherit;font-size:14px}
  td.act{max-width:340px}
  /* ── mobile ── */
  @media (max-width:720px){
    main{padding:10px}
    header{padding:10px 12px;gap:10px}
    .stats{font-size:11px;gap:10px}
    .panel{padding:12px;border-radius:8px}
    .kv{grid-template-columns:1fr;gap:2px 0}
    .kv div:nth-child(odd){margin-top:8px;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
    .row{flex-direction:column}
    table{font-size:12px}
    th,td{padding:6px 6px;max-width:180px}
    td.opt,th.opt{display:none}
    .action{font-size:14px}
    form.search input{font-size:16px} /* prevents iOS zoom-on-focus */
  }
</style>
</head>
<body>
<!-- cross-app nav (loads from the cairn origin when this page is proxied at /explorer; absent on a
     direct :8793 dev hit, which is fine). The explorer's own search header stays below it. -->
<header id="site-header" data-active="explorer" data-brand="Explorer"></header>
<header>
  <a class="brand" href="#/" title="explorer home"><span class="dot"></span>CSD&nbsp;<b>Explorer</b></a>
  <!-- submit is bound in the (nonced) script via addEventListener, NOT an inline onsubmit=: when this
       page is proxied at cairn's /explorer the CSP is `script-src 'self' 'nonce-…'`, and a nonce never
       authorizes inline event-handler attributes — the old onsubmit was silently CSP-blocked, so search
       did nothing via the public front door (it only worked hitting the indexer :8793 directly). -->
  <form class="search" id="search-form">
    <input id="q" aria-label="search the chain" placeholder="search: name.csd · block height · 0x txid · 0x address" autocomplete="off"/>
    <button>↵</button>
  </form>
  <div class="stats" id="stats"><span class="dim">connecting…</span></div>
</header>
<main id="view"><div class="loading">loading…</div></main>
<footer>
  CSD Explorer · a <b>derived, untrusted view</b> - inclusion is folded in your browser against the indexer's own block header (a consistency check, NOT a PoW/consensus proof; for that, run the L0 light client).
  <a href="https://github.com/InverseAltruism/csd-indexer" target="_blank">source</a>
</footer>
<script>
// API base. Standalone (the indexer at :8793, page at "/") → the origin. When mounted under a
// path prefix (e.g. proxied at https://cairn-substrate.com/explorer) → call the API under that
// same prefix (".../explorer/api/..."), so a single HTML works both standalone and embedded.
const API = (() => {
  const m = location.pathname.match(/(.*)\/explorer\/?$/);
  return location.origin + (m ? m[1] + "/explorer/api" : "");
})();
// Sibling proxies exist only when this page is served through the cairn front door
// (cairn-substrate.com/explorer): the NODE proxy enables attest→proposal decoding and the
// CairnX proxy enables token/name enrichment. Standalone (:8793) degrades gracefully.
const SIB = (() => {
  const m = location.pathname.match(/(.*)\/explorer\/?$/);
  if (!m) return { node:null, cairnx:null };
  return { node: location.origin + m[1] + "/api/rpc", cairnx: location.origin + m[1] + "/trade/api/cairnx" };
})();
const jx = async(base,p)=>{ if(!base) return null; try{ const r=await fetch(base+p); if(!r.ok) return null; return await r.json(); }catch{ return null; } };

// Known-address labels - operational identities that make flows legible. PUBLIC info only.
const LABELS = {
  "0x6b09ce74e6070ebc982ab0fb793a211c4d24f016": "CairnX treasury",
  "0x9d9305de03a77efd7f69720baff8e3e461cfe010": "Cairn treasury",
  "0xa8b5213a2682b4cd0af78a99ac8a804e55176f7c": "faucet",
  "0x44d92872a5b65d37d60ed532f41efe7c5aed59ec": "operator",
  "0xc25117a104e2cba2a69ad3981a3c67299f550504": "miner",
};
const labelOf = (a)=> LABELS[(a||'').toLowerCase()] || null;
const $ = (s,r=document)=>r.querySelector(s);
const el = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild;};
// HTML-escape ALL chain-derived text before it touches innerHTML. domain/uri (and any free-form
// field) are attacker-controlled on-chain - without this they are a stored-XSS sink.
const esc = (s)=> String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const short = (s,n=10)=> { s=esc(s); return s? (s.length>2*n? s.slice(0,n)+'…'+s.slice(-6): s):''; };
// short() is only ever called on hex (txid/hash/addr) so escaping is a no-op there, but it keeps
// the helper safe-by-default if ever pointed at free-form text.
// BigInt-safe: max_supply (~1.05e16 sats) exceeds 2^53, so divide in BigInt before going to Number
const fmtCSD = (v)=>{ const s=String(v); const sats=/^\d+$/.test(s)?BigInt(s):BigInt(Math.round(Number(v)||0)); const neg=sats<0n, a=neg?-sats:sats; const whole=a/100000000n, frac=a%100000000n; const fracStr=frac===0n?'':'.'+frac.toString().padStart(8,'0').replace(/0+$/,''); return (neg?'-':'')+Number(whole).toLocaleString()+fracStr+' CSD'; };
// CSD block timestamps can run AHEAD of wall-clock (miners stamp up to the future-drift tolerance), so a
// naive now-blockTime goes negative and clamps to 0 → every recent block reads "0s ago". Reference ages to
// max(now, newest-block-time) so they show correct RELATIVE spacing whether or not the chain clock leads.
let TIP_TIME = 0;   // newest block time seen (updated in blockRow)
const ago = (t)=>{if(!t)return '';const ref=Math.max(Math.floor(Date.now()/1000),TIP_TIME);const s=Math.max(0,ref-t);if(s<60)return s+'s ago';if(s<3600)return (s/60|0)+'m ago';if(s<86400)return (s/3600|0)+'h ago';return (s/86400|0)+'d ago';};
const j = async(p)=>{const r=await fetch(API+p);if(!r.ok)throw new Error(p+' → '+r.status);return r.json();};
const txt = async(p)=>{const r=await fetch(API+p);if(!r.ok)throw new Error(p+' → '+r.status);return r.text();};

// ── client-side merkle fold (SubtleCrypto, no deps). A consistency check against the
//    indexer's own header — NOT a trustless proof (no PoW/checkpoint verification here). ──
const hexToBytes = (h)=>{h=h.replace(/^0x/,'');const a=new Uint8Array(h.length/2);for(let i=0;i<a.length;i++)a[i]=parseInt(h.substr(i*2,2),16);return a;};
const bytesToHex = (b)=>'0x'+[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
async function sha256(b){return new Uint8Array(await crypto.subtle.digest('SHA-256',b));}
async function sha256d(b){return await sha256(await sha256(b));}
// fold a txid up its merkle branch exactly like csd-codec verifyMerkleProof / the light client
async function verifyInclusion(txid,pos,branch,root){
  let cur=hexToBytes(txid),idx=pos;
  for(const sibHex of branch){const sib=hexToBytes(sibHex);const buf=new Uint8Array(64);
    if(idx&1){buf.set(sib,0);buf.set(cur,32);}else{buf.set(cur,0);buf.set(sib,32);}
    cur=await sha256d(buf);idx>>=1;}
  return bytesToHex(cur).toLowerCase()===root.toLowerCase();
}

// ── router ──
window.addEventListener('hashchange',route);
// bind search here (NOT an inline onsubmit=) so it survives the nonce CSP on the proxied /explorer.
document.getElementById('search-form').addEventListener('submit',doSearch);
// (no eager warmDecimals() here — `let DEC` is declared below, so an eager call would hit its
// temporal dead zone and reject before its first await, doing nothing. Every render path awaits
// warmDecimals()/warmVerdicts() itself, which is where the actual warming happens.)
async function route(){
  const h=location.hash.slice(1)||'/';
  document.title = (h==='/'||h==='') ? 'CSD Explorer' : 'CSD Explorer · '+h.slice(1).replace('/',' ');
  const v=$('#view');v.innerHTML='<div class="panel"><div class="skel" style="width:38%"></div><div class="skel"></div><div class="skel" style="width:72%"></div></div>';
  try{
    if(h==='/'||h==='')          await home(v);
    else if(h.startsWith('/block/'))    await blockPage(v,h.slice(7));
    else if(h.startsWith('/tx/'))       await txPage(v,h.slice(4));
    else if(h.startsWith('/address/'))  await addrPage(v,h.slice(9));
    else if(h.startsWith('/domain/'))   await domainPage(v,decodeURIComponent(h.slice(8)));
    else if(h.startsWith('/proposal/')) await proposalPage(v,h.slice(10));
    else if(h.startsWith('/token/'))     await tokenPage(v,decodeURIComponent(h.slice(7)));
    else if(h.startsWith('/name/'))      await namePage(v,decodeURIComponent(h.slice(6)));
    else v.innerHTML='<div class="panel">unknown route</div>';
  }catch(e){v.innerHTML='<div class="panel red">error: '+esc(e.message)+'</div>';}
  paintNames(v);
}

function doSearch(e){e.preventDefault();let q=$('#q').value.trim();if(!q)return false;
  const csd=/\.csd$/i.test(q), bare=q.replace(/\.csd$/i,'');
  if(csd&&/^[a-z0-9][a-z0-9-]{0,30}$/i.test(bare))location.hash='/name/'+bare.toLowerCase();  // explicit name.csd
  else if(/^[0-9]+$/.test(q))location.hash='/block/'+q;            // bare number → height
  else if(/^0x[0-9a-f]{64}$/i.test(q))location.hash='/tx/'+q.toLowerCase();
  else if(/^0x[0-9a-f]{40}$/i.test(q))location.hash='/address/'+q.toLowerCase();
  else if(/^[a-z0-9][a-z0-9-]{0,30}$/i.test(q))location.hash='/name/'+q.toLowerCase();         // bare word → .csd name
  else location.hash='/domain/'+encodeURIComponent(q);
  $('#q').value='';return false;}

// href is built from validated hex / encodeURIComponent; label is escaped (it may be a free-form
// chain string like a domain). Both go through esc to block attribute/markup breakout.
const link=(href,label,cls='')=>`<a class="${esc(cls)}" href="#${esc(href)}">${esc(label)}</a>`;
const txidLink=(t)=>link('/tx/'+t,short(t,10),'mono');
// addrLink renders short-hex by default; the `data-name-addr` marker lets paintNames() upgrade it
// in place to the address's primary .csd name (reverse resolution) once resolved. The curated
// operational LABELS chip (treasury/faucet/miner/…) is kept alongside any resolved name.
const addrLink=(a)=>{
  if(!a||a==='0x?') return '<span class="dim">-</span>';
  const lbl=labelOf(a);
  return `<a class="mono addrl" data-name-addr="${esc(a)}" href="#/address/${esc(a)}">${short(a,8)}</a>`+(lbl?`<span class="chip">${esc(lbl)}</span>`:'');
};
// ── reverse name resolution (DISPLAY ONLY; front-door only — needs the CairnX sibling proxy) ──
// addr(lowercase) → primary .csd name | null, batched against /cairnx/primaries (cap 64/req) and
// memoized for the session. Standalone (no SIB.cairnx) stays hex — graceful degradation. This is a
// reverse view of nset round-trips; it is never used to route a payment, only to label addresses.
const NAMECACHE=new Map();
async function resolveNames(addrs){
  if(!SIB.cairnx) return;
  const want=[...new Set((addrs||[]).map(a=>String(a||'').toLowerCase()).filter(a=>/^0x[0-9a-f]{40}$/.test(a)&&!NAMECACHE.has(a)))];
  for(let i=0;i<want.length;i+=64){
    const chunk=want.slice(i,i+64);
    const r=await jx(SIB.cairnx,'/primaries?addrs='+chunk.join(','));
    const pri=(r&&r.primaries)||{};
    for(const a of chunk) NAMECACHE.set(a, typeof pri[a]==='string'?pri[a]:null);
  }
}
// Upgrade every not-yet-named addr link under `root` to its primary .csd name, in place.

const KIND_LABEL={ncommit:'🔒 sealed a commitment',name:'📛 claimed',nset:'📍 set address',nxfer:'🎁 transferred',nrenew:'♻️ renewed lease',offer:'🏷 listed for sale',ocancel:'✕ cancelled listing',bid:'🙋 bid',claim:'📌 reserved (open offer)',fill:'🤝 bought / sold (fill)',cancel:'✕ cancelled'};

// tiny inline-SVG sparkline (no deps); values:number[] → responsive <svg> string
function sparkline(values,{w=240,h=40,stroke='var(--green)',fill=true}={}){
  const v=values.filter(x=>isFinite(x)); if(v.length<2) return '';
  const lo=Math.min(...v),hi=Math.max(...v),span=(hi-lo)||1;
  const pts=v.map((y,i)=>[(i/(v.length-1))*(w-2)+1, h-1-((y-lo)/span)*(h-2)]);
  const d='M'+pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L');
  const area=fill?`<path d="${d} L${(w-1).toFixed(1)},${h-1} L1,${h-1} Z" fill="${stroke}" opacity=".12"/>`:'';
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block;width:100%;height:${h}px">${area}<path d="${d}" fill="none" stroke="${stroke}" stroke-width="1.5" vector-effect="non-scaling-stroke"/></svg>`;
}
// deterministic CSD emission curve (50 CSD initial reward, halving every 1,051,200 blocks)
function emittedAt(H){const HALVE=1051200;let total=0,reward=50e8,h=0;while(h<H&&reward>0){const end=Math.min(H,h+HALVE);total+=(end-h)*reward;h=end;reward=Math.floor(reward/2);}return total;}
// ── human-readable chain fields ──
function bitsToTarget(bits){const exp=(bits>>>24)&0xff, mant=BigInt(bits&0xffffff); return exp<=3?(mant>>BigInt(8*(3-exp))):(mant<<BigInt(8*(exp-3)));}
function difficultyOf(bits){const t=bitsToTarget(bits>>>0); if(t<=0n)return 0; const d1=0xffffn*(2n**208n); return Number(d1*1000n/t)/1000;} // relative to difficulty-1
function compactNum(n){n=Number(n)||0;const u=['','K','M','G','T','P','E','Z','Y'];let i=0;while(Math.abs(n)>=1000&&i<u.length-1){n/=1000;i++;}return (Math.abs(n)<10?n.toFixed(2):Math.abs(n)<100?n.toFixed(1):Math.round(n))+u[i];}
const DOMAIN_LABEL={'cairnx:v1':'CairnX · tokens · names · DEX','csd:anchor:base':'Base anchors','csd:bridge:deploy':'Bridge registry'};

// interactive SVG chart (line or bars) with hover crosshair + tooltip. pts:[{y,tip}] (tip is HTML and
// must be pre-escaped by the caller; here all callers pass numeric-only content). opts: kind/h/yfmt/xticks/mark.
function chart(host,pts,{kind='line',h=130,stroke='var(--green)',yfmt=(v)=>String(v),xticks=[],mark=null,yMax=null,refY=null,refLabel=''}={}){
  if(!host) return;
  if(!pts||pts.length<2){host.innerHTML='<div class="muted">not enough data yet</div>';return;}
  // Use the host's real pixel width as the viewBox width so preserveAspectRatio="none" is 1:1 and does
  // NOT stretch text/numbers horizontally. (Falls back to 600 if the host isn't measured yet.)
  const W=Math.max(320,Math.round((host.getBoundingClientRect&&host.getBoundingClientRect().width)||600)),padL=48,padR=10,padT=12,padB=22;
  const ys=pts.map(p=>p.y),lo=Math.min(0,...ys),hi=(Math.min(yMax==null?Infinity:yMax,Math.max(...ys))||1),span=(hi-lo)||1;
  const X=(i)=>padL+(i/(pts.length-1))*(W-padL-padR);
  const Y=(val)=>h-padB-((Math.min(val,hi)-lo)/span)*(h-padT-padB);   // clamp at hi so outliers don't escape the plot
  let s=`<svg viewBox="0 0 ${W} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block" role="img" aria-label="chart">`;
  for(let g=0;g<=3;g++){const val=lo+span*g/3,y=Y(val);s+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#1b1f1d"/><text x="${padL-6}" y="${(y+3).toFixed(1)}" text-anchor="end" fill="#6f6f6f" font-size="10">${esc(yfmt(val))}</text>`;}
  for(const t of xticks){const x=X(t.i);s+=`<text x="${x.toFixed(1)}" y="${h-7}" text-anchor="middle" fill="#6f6f6f" font-size="10">${esc(t.label)}</text>`;}
  if(kind==='bar'){const bw=Math.max(1,(W-padL-padR)/pts.length*0.7);pts.forEach((p,i)=>{const x=X(i),y=Y(p.y);s+=`<rect x="${(x-bw/2).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0,h-padB-y).toFixed(1)}" fill="${stroke}" opacity=".65"/>`;});}
  else{const d='M'+pts.map((p,i)=>X(i).toFixed(1)+','+Y(p.y).toFixed(1)).join(' L');s+=`<path d="${d} L${X(pts.length-1).toFixed(1)},${h-padB} L${padL},${h-padB} Z" fill="${stroke}" opacity=".1"/><path d="${d}" fill="none" stroke="${stroke}" stroke-width="1.6" vector-effect="non-scaling-stroke"/>`;}
  if(mark){const x=padL+Math.min(1,Math.max(0,mark.frac))*(W-padL-padR);s+=`<line x1="${x.toFixed(1)}" y1="${padT}" x2="${x.toFixed(1)}" y2="${h-padB}" stroke="#ffd24a" stroke-dasharray="3 2"/><text x="${x.toFixed(1)}" y="${padT+8}" text-anchor="middle" fill="#ffd24a" font-size="9">${esc(mark.label)}</text>`;}
  if(refY!=null){const y=Y(refY);s+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#ffd24a" stroke-dasharray="4 3" opacity=".85"/><text x="${(W-padR).toFixed(1)}" y="${(y-3).toFixed(1)}" text-anchor="end" fill="#ffd24a" font-size="9">${esc(refLabel)}</text>`;}
  s+=`<line class="ch-cross" stroke="${stroke}" stroke-dasharray="2 3" y1="${padT}" y2="${h-padB}" style="opacity:0"/><circle class="ch-dot" r="3" fill="${stroke}" style="opacity:0"/></svg>`;
  host.innerHTML=`<div class="chart-wrap">${s}<div class="ch-tip"></div></div>`;
  const svg=host.querySelector('svg'),cross=host.querySelector('.ch-cross'),dot=host.querySelector('.ch-dot'),tip=host.querySelector('.ch-tip');
  const move=(cx)=>{const r=svg.getBoundingClientRect();
    // remap the cursor (which spans the full svg incl. left/right padding) onto the PLOT area, so the
    // crosshair + tooltip land under the cursor instead of offset right by padL's worth.
    const fracFull=(cx-r.left)/r.width,plotL=padL/W,plotR=(W-padR)/W;
    const frac=Math.min(1,Math.max(0,(fracFull-plotL)/(plotR-plotL)));const i=Math.round(frac*(pts.length-1));const x=X(i),y=Y(pts[i].y);
    cross.setAttribute('x1',x);cross.setAttribute('x2',x);cross.style.opacity='1';dot.setAttribute('cx',x);dot.setAttribute('cy',y);dot.style.opacity='1';
    tip.innerHTML=pts[i].tip;tip.style.left=(x/W*100)+'%';tip.style.top=(y/h*100)+'%';tip.style.opacity='1';};
  svg.addEventListener('mousemove',e=>move(e.clientX));
  svg.addEventListener('touchmove',e=>{if(e.touches[0])move(e.touches[0].clientX);},{passive:true});
  svg.addEventListener('mouseleave',()=>{cross.style.opacity='0';dot.style.opacity='0';tip.style.opacity='0';});
}

// ── CairnX record → plain English (mirrors cairnx CONVENTION §4/§9-18; display only) ──
// SECURITY: dec comes from RAW on-chain records (attacker-controlled) on the home activity feed —
// clamp it so a crafted decimals (e.g. 7_000_000) can't blow up 10**dec / padStart into a DoS.
const fmtAmt=(v,dec)=>{try{dec=Number(dec)||0;if(dec<0||dec>30)return esc(v);const n=BigInt(v);const d=BigInt(10)**BigInt(dec);const i=n/d,f=n%d;return f?`${i}.${String(f).padStart(dec,'0').replace(/0+$/,'')}`:i.toLocaleString();}catch{return esc(v);}};
// token decimals, warmed once per session from the resolver (cairn front door only) - action
// lines show HUMAN amounts when known, labeled base units otherwise (never a silent 10^n shift)
let DEC=null;
async function warmDecimals(){ if(DEC) return DEC; DEC={}; const t=await jx(SIB.cairnx,'/tokens'); for(const x of (t||[])) DEC[x.ticker]=x.decimals; return DEC; }
const amt=(v,ticker)=> DEC&&DEC[ticker]!=null ? fmtAmt(v,DEC[ticker]) : `${esc(v)} <span class="dim">base units</span>`;
// CairnX VERDICT map (txid → {applied, note}) from the resolver's applied-event log, warmed
// fresh per page (verdicts change as blocks land). Lets us show that a record the resolver
// REFUSED (mint past supply, mint by a non-issuer, deploy with an unpaid fee, an underfunded
// transfer…) had NO on-chain effect — instead of rendering it as if it succeeded.
let VER=null;
async function warmVerdicts(){ VER={}; try{ const log=await jx(SIB.cairnx,'/log?limit=5000'); for(const e of (log||[])) VER[String(e.id).toLowerCase()]={applied:e.ok,note:e.note}; }catch{} return VER; }
// Wrap a decoded record line with its resolver verdict. A refused record is struck through and
// tagged "no effect" with the reason — the tx is real and paid its anchor fee, but the CairnX
// action was a no-op that anyone re-running the open resolver reproduces.
function cxVerdict(body,verdict){
  if(body==null) return body;
  if(verdict&&verdict.applied===false)
    return `<span class="cx-void">${body}</span> <span class="cx-noeffect" title="The CairnX resolver REJECTED this record — it has no effect on token state, and anyone re-running the open resolver gets the same result. The transaction is real and paid its anchor fee; only the CairnX action was a no-op.">✕ no effect${verdict.note?` — ${esc(verdict.note)}`:''}</span>`;
  return body;
}
function describeCairnx(rec){
  try{
    const giveTok = rec.give&&rec.give.ticker, giveName = rec.give&&rec.give.name;
    switch(rec.t){
      case 'deploy': return `🪙 <span class="what">Deployed token <b class="amber">${esc(rec.ticker)}</b></span> - supply ${fmtAmt(rec.supply,rec.decimals)}, ${rec.mint==='issuer'?'issuer-mint (fixed)':'open mint'}${rec.name?` · “${esc(rec.name)}”`:''}`;
      case 'mint': return `⛏ <span class="what">Minted <b class="amber">${esc(rec.ticker)}</b></span>${rec.amount?` - ${amt(rec.amount,rec.ticker)}`:''}`;
      case 'transfer': return `→ <span class="what">Transferred <b>${amt(rec.amount,rec.ticker)}</b> <b class="amber">${esc(rec.ticker)}</b></span> to ${addrLink(rec.to)}`;
      case 'offer': {
        const what = giveName?`name <b class="green">${esc(giveName)}.csd</b>`:`<b>${amt(rec.give.amount,giveTok)}</b> <b class="amber">${esc(giveTok)}</b>`;
        const price = rec.want.value!=null?`${fmtCSD(rec.want.value)}`:`${esc(rec.want.amount)} ${esc(rec.want.ticker)}`;
        return `🏷 <span class="what">Listed ${what} for <b>${price}</b></span>${rec.taker?` - reserved for ${addrLink(rec.taker)} (RFQ)`:' - open offer'}${rec.min?` · partial fills ≥ ${fmtCSD(rec.min)}`:''}${rec.bid?' · answers a bid':''}`;
      }
      case 'bid': {
        const want = rec.want.name?`name <b class="green">${esc(rec.want.name)}.csd</b>`:`<b>${amt(rec.want.amount,rec.want.ticker)}</b> <b class="amber">${esc(rec.want.ticker)}</b>`;
        return `🙋 <span class="what">Bid <b>${fmtCSD(rec.give.value)}</b> for ${want}</span> - non-binding; a seller answers with a reserved offer`;
      }
      case 'ocancel': return `✕ <span class="what">Cancelled all open offers</span>${rec.ticker?` in <b class="amber">${esc(rec.ticker)}</b>`:rec.name?` on <b class="green">${esc(rec.name)}.csd</b>`:''}`;
      case 'ncommit': return `🔒 <span class="what">Sealed a name commitment</span> - the name is revealed later (front-run defense)`;
      case 'name': return `📛 <span class="what">${rec.salt?'Revealed & claimed':'Claimed'} name <b class="green">${esc(rec.name)}.csd</b></span>`;
      case 'nxfer': return `🎁 <span class="what">Transferred name <b class="green">${esc(rec.name)}.csd</b></span> to ${addrLink(rec.to)}`;
      case 'nset': return `📍 <span class="what">Pointed <b class="green">${esc(rec.name)}.csd</b></span> at ${addrLink(rec.addr)}`;
      case 'nrenew': return `♻️ <span class="what">Renewed the lease on <b class="green">${esc(rec.name)}.csd</b></span> - +1 year`;
      case 'tmeta': return `🖼 <span class="what">Updated <b class="amber">${esc(rec.ticker)}</b> metadata</span> (content-addressed)`;
      default: return null;
    }
  }catch{return null;}
}
function describeDomainRecord(domain,uri,verdict){

  if(domain==='csd:anchor:base'){ try{ const a=JSON.parse(uri); return `⚓ <span class="what">Anchored Base block <b>${Number(a.height??a.number??0).toLocaleString()}</b></span> into CSD (cross-chain checkpoint)`; }catch{ return null; } }

// payment flow of a tx, from the signer's perspective (single-signer chain: signer pays all inputs)
function flowHtml(tx){
  const me=(tx.signer||'').toLowerCase();
  let toOthers=0, change=0; const outs=[];
  for(const o of (tx.outputs||[])){
    if((o.addr||'').toLowerCase()===me) change+=o.value;
    else { toOthers+=o.value; outs.push(o); }
  }
  const parts=[];
  if(tx.coinbase) parts.push(`<span class="f in">mined <b>+${fmtCSD((tx.outputs||[]).reduce((s,o)=>s+o.value,0))}</b> (block reward)</span>`);
  else{
    if(outs.length) parts.push(`<span class="f out">sent <b>−${fmtCSD(toOthers)}</b> ${outs.length===1?`to ${addrLink(outs[0].addr)}`:`to ${outs.length} recipients`}</span>`);
    parts.push(`<span class="f out">fee <b>−${fmtCSD(tx.fee)}</b></span>`);
    if(change) parts.push(`<span class="f">change back <b>${fmtCSD(change)}</b></span>`);
  }
  return `<div class="flow">${parts.join('')}</div>`;
}

function blockRow(b,live){
  if(b.time) TIP_TIME=Math.max(TIP_TIME,b.time);   // keep the age reference current with the chain tip
  return el(`<tr class="${live?'feed-row':''}" data-h="${b.height}" data-hash="${b.hash}"><td>${link('/block/'+b.height,b.height)}</td>

}
async function recentBlocks(){
  // one round-trip (newest-first) instead of a tip→N×(height→hash→block) waterfall
  try{ const r=await j('/blocks/recent?limit=12'); if(Array.isArray(r)) return r; }catch{}
  // fallback for an indexer without /blocks/recent (older deploy / different host)
  const tip=await j('/blocks/tip/height');const out=[];
  for(let h=tip;h>tip-12&&h>=0;h--){const hash=await j('/block-height/'+h).catch(()=>null);if(!hash)continue;out.push(await j('/block/'+hash));}
  return out;
}
function subscribeBlocks(tb){
  // Auto-refresh by POLLING /blocks/recent (real timestamps, deduped by height). This works regardless of
  // SSE / the front-door proxy, which does NOT forward the event-stream — the old EventSource-only feed
  // therefore never updated through cairn-subst.com/explorer, and it stamped streamed rows with the CLIENT
  // clock (Date.now()) so every live block read "0s ago". SSE, when reachable (standalone), just nudges a poll.
  const seen=new Map(); tb.querySelectorAll('[data-h]').forEach(r=>seen.set(+r.getAttribute('data-h'), r.getAttribute('data-hash')||''));
  let es=null,last=0;
  async function poll(){
    if(!tb.isConnected){ clearInterval(iv); try{es&&es.close();}catch{} return; }   // view navigated away → stop
    const now=Date.now(); if(now-last<1500) return; last=now;                        // debounce SSE bursts
    let rows; try{ rows=await j('/blocks/recent?limit=12'); }catch{ return; }
    if(!Array.isArray(rows)) return;
    // NEW or CHANGED-hash (reorg) blocks, keyed on height+hash; oldest-first so prepends keep order
    const fresh=rows.filter(b=>b&&seen.get(b.height)!==b.hash).sort((a,c)=>a.height-c.height);
    for(const b of fresh){ const existing=tb.querySelector(`tr[data-h="${b.height}"]`); const nr=blockRow(b,true);
      if(existing){ existing.replaceWith(nr); }                                       // reorg: replace the orphaned row in place
      else { tb.prepend(nr); const hn=$('.pu.hot .n'); if(hn) hn.textContent=Number(b.height).toLocaleString(); }   // new: prepend + keep the hero height live
      seen.set(b.height, b.hash); }
    while(tb.children.length>14){ const lc=tb.lastChild; seen.delete(+lc.getAttribute('data-h')); tb.removeChild(lc); }
    if(fresh.length) document.querySelectorAll('[data-ts]').forEach(e=>{const t=+e.getAttribute('data-ts'); if(t)e.textContent=ago(t);}); // re-age with the advanced TIP_TIME
  }
  const iv=setInterval(poll,12000);
  try{ es=new EventSource(API+'/stream/blocks');
    es.addEventListener('block',()=>poll());
    es.addEventListener('reorg',ev=>{try{const d=JSON.parse(ev.data);const p=$('#livepill');if(p){p.textContent='⟲ reorg @'+d.ancestor;p.classList.add('red');}}catch{}});
  }catch{}
}

      // precise per-record verdict for the detail page (authoritative even past a bounded log page)
      const vr=await jx(SIB.cairnx,'/record/'+tx.txid).catch(()=>null);

    } else if(tx.app_type==='Attest'){
      // the attested proposal id lives in the tx app payload - ask the node (cairn front door only)
      const full=await jx(SIB.node,'/tx/'+tx.txid);
      const pid=full&&full.tx&&full.tx.app&&full.tx.app.proposal_id;
      if(pid){
        const pidHex=typeof pid==='string'?pid:'0x'+Array.from(pid).map(x=>x.toString(16).padStart(2,'0')).join('');
        const prop=await j('/proposal/'+pidHex).catch(()=>null);
        const score=full.tx.app.score, conf=full.tx.app.confidence;
        if(prop&&prop.domain==='cairnx:v1'){
          let rec=null; try{rec=JSON.parse(prop.uri);}catch{}
          const me=(tx.signer||'').toLowerCase();
          const paid=(tx.outputs||[]).filter(o=>(o.addr||'').toLowerCase()!==me).reduce((s,o)=>s+o.value,0);

          else if(conf===1000000&&rec) line=`⇄ <span class="what">Token swap fill</span> - took the offer ${link('/proposal/'+pidHex,short(pidHex,10),'mono')} (${amt(rec.give&&rec.give.amount,rec.give&&rec.give.ticker)} ${esc(rec.give&&rec.give.ticker)} for ${amt(rec.want&&rec.want.amount,rec.want&&rec.want.ticker)} ${esc(rec.want&&rec.want.ticker)}, paid in tokens - no CSD moves)`;
          /* v1.7 open-lane CLAIM (Attest score=SCORE_CLAIM=50, no payment): a free reservation, NOT a purchase.
             Must NOT read as "Bought … for 0 CSD" — the fill (score=100) comes later. */
          else if(rec&&rec.t==='offer'&&score===50) line=`📌 <span class="what">Reserved ${what}</span> <span class="muted">(open offer — claimed; the purchase completes after a short reorg-safe wait)</span> - offer ${link('/proposal/'+pidHex,short(pidHex,10),'mono')}`;
          else if(rec&&rec.t==='offer'&&score===100) line=`🤝 <span class="what">Bought ${what}</span> for <b>${fmtCSD(paid)}</b> (payment + fill in ONE atomic tx) - offer ${link('/proposal/'+pidHex,short(pidHex,10),'mono')}`;
          else line=`⭐ <span class="what">Attested</span> score ${score} on ${link('/proposal/'+pidHex,short(pidHex,10),'mono')}`;
        } else if(prop){
          line=`⭐ <span class="what">Attested</span> score ${score} on ${link('/proposal/'+pidHex,short(pidHex,10),'mono')} in ${link('/domain/'+encodeURIComponent(prop.domain),prop.domain)}`;
        }

    else {
      const me=(tx.signer||'').toLowerCase();
      const outs=(tx.outputs||[]).filter(o=>(o.addr||'').toLowerCase()!==me);
      line=`💸 <span class="what">${addrLink(tx.signer)} sent CSD</span>${outs.length===1?` to ${addrLink(outs[0].addr)}`:` to ${outs.length} recipients`}`;
    }
    slot.innerHTML=line||'<span class="dim">a plain chain transaction</span>';
    paintNames(human);
  })();

  v.appendChild(el(`<div class="panel"><h2>transaction ${typeBadge} <span id="inclbadge" class="badge pend">verifying inclusion…</span></h2>
    <div class="kv">

  if(proof){

      <div class="muted">This proof is served by an <i>untrusted</i> indexer, and so is the block header below. Your browser folds the branch and checks it equals the indexer's stated merkle root - a <b>consistency check</b> that the proof matches the header this same indexer reports. It is <b>NOT</b> a PoW/consensus proof: nothing here verifies the header's proof-of-work or that it is on the canonical chain. For a trustless inclusion proof, fold against a header obtained from the L0 light client (which checks PoW + checkpoints).</div>

    // untrusted indexer (no PoW/header verification here), so a matching fold proves only that
    // the proof is CONSISTENT with the header this indexer reports — not consensus inclusion.
    try{

    if(!toks.length&&!names.length) return;
    $('#cxpanel').innerHTML=`<div class="cxbal">${
      toks.map(([t,b])=>`<span class="tk"><b>${esc(t)}</b> ${fmtAmt(b.available,dec[t]??0)}${Number(b.locked)?` <span class="dim">(+${fmtAmt(b.locked,dec[t]??0)} locked in offers)</span>`:''}</span>`).join('')}${
      names.map(n=>`<span class="nm">${esc(n)}.csd</span>`).join('')}</div>`;
  })();

  // tx table with a human ACTION column + direction relative to THIS address.
  // Heading shows the TRUE total (chain_stats.tx_count), not the loaded-page length; pages append
  // via the Esplora keyset cursor (/txs/chain/:last), so a hot treasury/faucet address is no longer
  // capped at its latest 25 txs.
  const me=a.toLowerCase();
  const PAGE=25;
  v.appendChild(el(`<div class="panel"><h2>transactions (${s.tx_count})</h2><div class="scroll-x"><table><thead><tr><th>txid</th><th>action</th><th class="opt">block</th><th>Δ for this address</th></tr></thead>
    <tbody id="txrows"></tbody></table></div><div id="txmore" style="margin-top:8px"></div></div>`));
  let loaded=0, lastTxid=null;
  const appendTxPage=(page)=>{
    if(!Array.isArray(page)||!page.length){const m=$('#txmore'); if(m) m.innerHTML=''; return;}
    const start=loaded;
    $('#txrows').insertAdjacentHTML('beforeend',page.map((t,k)=>{const i=start+k;return `<tr><td>${txidLink(t.txid)}</td><td class="act" id="act-${i}"><span class="dim">${esc(t.app_type)}</span></td><td class="opt">${link('/block/'+t.height,t.height)}</td><td id="dir-${i}" class="dim">…</td></tr>`;}).join(''));
    loaded+=page.length; lastTxid=page[page.length-1].txid;
    page.forEach((t,k)=>{decodeTxRow(t,start+k);});
    const more=$('#txmore');
    if(more) more.innerHTML=(page.length===PAGE&&loaded<s.tx_count)?`<button class="tab" id="txloadmore">load more (${loaded}/${s.tx_count})</button>`:'';
    const btn=$('#txloadmore');
    if(btn) btn.onclick=async()=>{btn.disabled=true;btn.textContent='loading…';appendTxPage(await j('/address/'+a+'/txs/chain/'+lastTxid).catch(()=>[]));};
  };

  // decode one row (each is a cheap local lookup)
  async function decodeTxRow(t,i){
    try{
      // rows carry outputs inline (indexer >= 0.2.5) — no per-row /tx refetch; older responses fall back to one fetch
      const full=(t&&Array.isArray(t.outputs))?t:await j('/tx/'+t.txid);
      // direction: outputs to me − (if I signed: everything I paid)
      const recv=(full.outputs||[]).filter(o=>(o.addr||'').toLowerCase()===me).reduce((x,o)=>x+o.value,0);
      let delta;
      if((full.signer||'').toLowerCase()===me){
        const out=(full.outputs||[]).filter(o=>(o.addr||'').toLowerCase()!==me).reduce((x,o)=>x+o.value,0);
        delta=-(out+full.fee);
      } else delta=recv;
      const d=$('#dir-'+i);
      if(d) d.outerHTML=`<td class="${delta>=0?'green':'red'}">${delta>=0?'+':''}${fmtCSD(delta)}</td>`;
      if(full.app_type==='Propose'){
        const prop=await j('/proposal/'+t.txid).catch(()=>null);
        const line=prop&&(describeDomainRecord(prop.domain,prop.uri,VER&&VER[t.txid.toLowerCase()])||`📌 proposal in ${esc(prop.domain)}`);
        const slot=$('#act-'+i); if(slot&&line) slot.innerHTML=line;
      } else if(full.app_type==='Attest'&&SIB.node){
        const nf=await jx(SIB.node,'/tx/'+t.txid);
        const pid=nf&&nf.tx&&nf.tx.app&&nf.tx.app.proposal_id;
        if(pid){const prop=await j('/proposal/'+pid).catch(()=>null);
          if(prop&&prop.domain==='cairnx:v1'){let rec=null;try{rec=JSON.parse(prop.uri);}catch{}
            const slot=$('#act-'+i);
            if(slot){ const sc=nf.tx.app.score, wn=rec&&rec.give?(rec.give.name?esc(rec.give.name)+'.csd':esc(rec.give.ticker)):''; slot.innerHTML = sc===0?'✕ cancelled an offer/bid':(rec&&rec.t==='offer'&&sc===50?`📌 reserved ${wn}`:(rec&&rec.t==='offer'&&sc===100?`🤝 bought ${wn}`:(rec&&rec.t==='offer'?`🤝 fill - ${wn}`:'⭐ attested'))); }
          }}
      } else if(full.coinbase){const slot=$('#act-'+i); if(slot) slot.innerHTML='⛏ block reward';}
      else if(full.app_type==='Transfer'||full.app_type==='None'){const slot=$('#act-'+i); if(slot) slot.innerHTML='💸 CSD transfer';}
      paintNames($('#act-'+i));
    }catch{}
  }

  appendTxPage(txs);
}

// ── .csd name profile page (the name-service centerpiece) — front-door only ──
async function namePage(v,label){
  label=String(label||'').toLowerCase().replace(/\.csd$/,'');
  if(!SIB.cairnx){ v.innerHTML='<div class="panel"><h2>name</h2><div class="muted">.csd name pages need the cairn front door (cairn-substrate.com/explorer). This standalone view has no name resolver.</div></div>'; return; }
  const n=await jx(SIB.cairnx,'/name/'+encodeURIComponent(label));
  v.innerHTML='';
  if(!n||n.ok===false){
    v.appendChild(el(`<div class="panel namehdr"><div>${nameAvatar(label)}</div>
      <div><h2 style="font-size:20px;margin:0;color:var(--fg)">${esc(label)}<span class="dim">.csd</span></h2>
      <div class="muted">not registered. <a href="https://cairn-substrate.com/names" target="_blank" rel="noopener">register it ↗</a></div></div></div>`));
    return;
  }
  const owner=n.owner, target=n.addr||n.owner, via=n.addr?'address record (nset)':'owner (no record set)';
  const isPrimary=n.addr&&owner&&n.addr.toLowerCase()===owner.toLowerCase();
  const L=n.lease||{};
  const leaseLine = !L.leased ? '<span class="dim">no lease (legacy registration)</span>'
    : L.lapsed ? '<span class="red">lapsed</span> · in recapture window'
    : L.inGrace ? `<span class="amber">in grace</span> · ~${epochsToHuman(L.graceEpochsLeft)} to recapture`
    : `<span class="green">active</span> · ~${epochsToHuman(L.epochsLeft)} remaining`;
  v.appendChild(el(`<div class="panel namehdr"><div>${nameAvatar(label)}</div>
    <div><h2 style="font-size:20px;margin:0;color:var(--green)">${esc(label)}<span class="dim">.csd</span>${isPrimary?' <span class="badge ok">★ primary</span>':''}</h2>
      <div class="muted">${n.locked?'<span class="amber">locked in an open offer</span>':'a .csd name on Compute Substrate'}${n.viaFill?' · acquired via a marketplace fill':''}</div></div></div>`));
  v.appendChild(el(`<div class="panel"><h2>record</h2><div class="kv">
    <div>owner</div><div class="v">${addrLink(owner)}</div>
    <div>resolves to</div><div class="v">${addrLink(target)} <span class="dim">(${via})</span></div>
    <div>lease</div><div class="v">${leaseLine}</div>
    <div>claimed</div><div class="v">${link('/block/'+n.height,n.height)} <span class="dim">· effective h${n.effectiveHeight}</span></div>
  </div></div>`));
  const prof=n.profile||{}, pk=Object.keys(prof).filter(k=>prof[k]);
  if(pk.length) v.appendChild(el(`<div class="panel"><h2>profile</h2><div class="kv">${pk.map(k=>`<div>${esc(k)}</div><div class="v">${esc(String(prof[k]))}</div>`).join('')}</div></div>`));
  if(n.offer){ const o=n.offer, price=o.want&&o.want.value!=null?fmtCSD(o.want.value):(o.want?`${esc(o.want.amount)} ${esc(o.want.ticker)}`:'—');
    v.appendChild(el(`<div class="panel"><h2>for sale</h2><div class="action">🏷 <span class="what">Listed for <b>${price}</b></span>${o.taker?' · reserved (RFQ)':' · open offer'}</div>
      <div class="muted">Buy at <a href="https://cairn-substrate.com/names" target="_blank" rel="noopener">/names ↗</a></div></div>`));
  }
  const hist=await jx(SIB.cairnx,'/name-history/'+encodeURIComponent(label));
  const evs=((hist&&hist.events)||[]).slice().reverse();
  if(evs.length) v.appendChild(el(`<div class="panel"><h2>history (${evs.length})</h2><div class="scroll-x"><table><thead><tr><th>action</th><th>tx</th><th class="opt">block</th></tr></thead>
    <tbody>${evs.slice(0,40).map(ev=>`<tr><td>${kindLabel(ev.kind)}</td><td>${txidLink(ev.txid)}</td><td class="opt">${ev.height?link('/block/'+ev.height,ev.height):''}</td></tr>`).join('')}</tbody></table></div></div>`));
  paintNames(v);
}

async function proposalPage(v,id){
  await warmDecimals();
  const p=await j('/proposal/'+id);
  v.innerHTML='';
  const vr=await jx(SIB.cairnx,'/record/'+id).catch(()=>null);
  const human=describeDomainRecord(p.domain,p.uri,vr&&typeof vr.applied==='boolean'?vr:null);
  if(human) v.appendChild(el(`<div class="panel"><h2>what happened</h2><div class="action">${human}</div></div>`));
  v.appendChild(el(`<div class="panel"><h2>proposal <span id="cibadge" class="badge pend">checking content…</span></h2><div class="kv">
    <div>txid</div><div class="v mono green">${esc(p.txid)}</div>
    <div>domain</div><div class="v">${link('/domain/'+encodeURIComponent(p.domain),p.domain)}</div>
    <div>payload hash</div><div class="v mono dim">${esc(p.payload_hash)}</div>
    <div>uri</div><div class="v dim">${p.uri?esc(p.uri):'-'}</div>
    <div>proposer</div><div class="v">${addrLink(p.proposer)}</div>
    <div>fee</div><div class="v">${fmtCSD(p.fee)}</div>
    <div>expires</div><div class="v">epoch ${p.expires_epoch} <span class="dim">(~block ${(Number(p.expires_epoch)*30).toLocaleString()})</span></div>
    <div>attestations</div><div class="v">${p.attestation_count}</div>
  </div></div>`));
  v.appendChild(el(`<div class="panel"><h2>attestations (${(p.attestations||[]).length}) <span class="pill">per-attester - not on-chain aggregate</span></h2>
    <table><thead><tr><th>attester</th><th>score</th><th>confidence</th><th>fee</th><th>tx</th></tr></thead>
    <tbody>${(p.attestations||[]).map(a=>`<tr><td>${addrLink(a.attester)}</td><td class="amber">${a.score}</td><td>${a.confidence}</td><td>${fmtCSD(a.fee)}</td><td>${txidLink(a.txid)}</td></tr>`).join('')||'<tr><td colspan=5 class="dim">none yet</td></tr>'}</tbody></table></div>`));
  // dogfood self-certification: fetch content, hash it in-browser, compare to the on-chain payload_hash
  try{
    const bytes=new TextEncoder().encode(await txt('/content/'+p.payload_hash));
    const got=bytesToHex(await sha256(bytes));
    const ok=got.toLowerCase()===p.payload_hash.toLowerCase();
    const b=$('#cibadge');b.textContent=ok?'✓ content integrity verified':'✗ content MISMATCH';b.className='badge '+(ok?'ok':'bad');
  }catch(e){const b=$('#cibadge');b.textContent='content unavailable';b.className='badge pend';}
}

// ── header stats + live ──
async function refreshStats(){
  try{const h=await j('/health');
    const ss=h.seconds_since_tip, lag=Math.max(0,(h.tip_height||0)-(h.indexed_height||0));
    const fresh=!h.stale&&lag<2&&(ss==null||ss<180);
    const behind=ss==null?'syncing':ss<60?ss+'s':ss<3600?Math.floor(ss/60)+'m':Math.floor(ss/3600)+'h';
    // Honest badge: a real indexer LAG (indexed_height < node tip -> catching up) is distinct from a merely
    // OLD tip (the indexer is AT the tip but blocks are slow, e.g. low hashrate). The latter is NOT the
    // indexer being "behind", so label it as the age of the newest block instead of blaming the indexer.
    const dot = lag>=2
      ? `<span class="amber" title="the indexer is catching up to the node (${lag} blocks)">● ${lag} blocks behind</span>`
      : fresh
        ? '<span class="green" title="indexer is at the chain tip">● live</span>'
        : `<span class="amber" title="the indexer is at the tip; the newest block is ${behind} old (slow blocks / low hashrate)">● last block ${behind} ago</span>`;
    $('#stats').innerHTML=`<span>height <b>${h.indexed_height.toLocaleString()}</b></span><span>txs <b>${h.txs.toLocaleString()}</b></span><span>proposals <b>${h.proposals}</b></span>${dot}`;
  }catch{$('#stats').innerHTML='<span class="red">● indexer offline</span>';}
}
refreshStats();setInterval(refreshStats,15000);
setInterval(()=>document.querySelectorAll('[data-ts]').forEach(e=>{const t=+e.getAttribute('data-ts'); if(t)e.textContent=ago(t);}),10000);  // tick relative times
route();
