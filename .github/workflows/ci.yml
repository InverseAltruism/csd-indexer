name: ci
on:
  push: { branches: [master, main] }
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: test (offline, deterministic)
        run: npx tsx --test test/decode.test.ts test/indexer.test.ts test/stream.test.ts test/registry.test.ts test/identity.test.ts
